appId: com.bifrost.app
productName: Bifrost
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{logo.png,.superpowers,docs}'
asarUnpack:
  - resources/**
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Bifrost needs access to your project files.
    - NSDownloadsFolderUsageDescription: Bifrost needs access to download files.
  notarize: false
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
dmg:
  artifactName: Bifrost-${version}-${arch}.${ext}
  icon: build/icon.icns
  title: Bifrost
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  executableName: bifrost
  icon: build/icon.ico
nsis:
  artifactName: Bifrost-${version}-setup.${ext}
  shortcutName: Bifrost
  uninstallDisplayName: Bifrost
  createDesktopShortcut: always
linux:
  target:
    - AppImage
    - deb
  maintainer: bifrost
  category: Development
  icon: build/icon.png
appImage:
  artifactName: Bifrost-${version}.${ext}
npmRebuild: false
