name: Update Homebrew Cask

on:
  release:
    types:
      - published

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download published release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" \
            --pattern "Bifrost-${VERSION}-arm64-mac.zip" \
            --pattern "Bifrost-${VERSION}-mac.zip" \
            --dir dist

      - name: Generate Homebrew cask from published assets
        run: npm run generate:cask

      - name: Create cask update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: cask-update-${{ github.ref_name }}
          base: ${{ github.event.repository.default_branch }}
          commit-message: "build: update Homebrew cask for ${{ github.ref_name }}"
          title: "build: update Homebrew cask for ${{ github.ref_name }}"
          body: "Automated cask update for release ${{ github.ref_name }}."
          add-paths: |
            Casks/bifrost.rb
