name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build macOS zip artifacts
        run: npm run build:mac

      - name: Generate Homebrew cask with build hashes
        run: npm run generate:cask

      - name: Push Homebrew cask update branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          cp Casks/bifrost.rb /tmp/bifrost.rb
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B cask-update "origin/$DEFAULT_BRANCH"
          cp /tmp/bifrost.rb Casks/bifrost.rb
          if git diff --quiet -- Casks/bifrost.rb; then
            echo "Cask already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/bifrost.rb
          git commit -m "build: update Homebrew cask for $GITHUB_REF_NAME"
          git push --force origin HEAD:cask-update-$GITHUB_REF_NAME

      - name: Create or update Homebrew cask PR
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet "origin/$DEFAULT_BRANCH" -- Casks/bifrost.rb; then
            echo "No cask PR needed"
            exit 0
          fi
          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "cask-update-$GITHUB_REF_NAME" \
            --title "build: update Homebrew cask for $GITHUB_REF_NAME" \
            --body "Automated cask update for release $GITHUB_REF_NAME." \
          || gh pr edit "cask-update-$GITHUB_REF_NAME" \
            --title "build: update Homebrew cask for $GITHUB_REF_NAME" \
            --body "Automated cask update for release $GITHUB_REF_NAME."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release-artifacts
          path: |
            dist/Bifrost-*-mac.zip
            dist/Bifrost-*-mac.zip.blockmap
            Casks/bifrost.rb
          if-no-files-found: error

  release:
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/mac-release-artifacts/dist/* \
            --generate-notes \
            $([ "${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}" = "true" ] && echo "--prerelease")
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
