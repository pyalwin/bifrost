name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build macOS zip artifacts
        run: npm run build:mac

      - name: Verify app bundles
        run: |
          codesign --verify --deep --strict --verbose=2 dist/mac-arm64/Bifrost.app
          codesign --verify --deep --strict --verbose=2 dist/mac/Bifrost.app

      - name: Verify Homebrew cask is current
        run: |
          npm run generate:cask
          git diff --exit-code -- Casks/bifrost.rb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release-artifacts
          path: |
            dist/Bifrost-*-mac.zip
            dist/Bifrost-*-mac.zip.blockmap
          if-no-files-found: error

  release:
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/mac-release-artifacts/* \
            --generate-notes \
            $([ "${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}" = "true" ] && echo "--prerelease")
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
